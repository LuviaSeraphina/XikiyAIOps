# XikiyAIOps Alertmanager 配置
# 部署时建议软链到 /etc/prometheus/alertmanager.yml

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h
  receiver: 'xikiy-aiops'

receivers:
  - name: 'xikiy-aiops'
    webhook_configs:
      - url: 'http://localhost:8001/api/alerts/webhook'
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname']
