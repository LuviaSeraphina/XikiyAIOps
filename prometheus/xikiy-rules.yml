# XikiyAIOps Prometheus 告警规则
# 部署时建议软链到 /etc/prometheus/xikiy-rules.yml

groups:
  - name: xikiy-aiops-alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高 (实例 {{ $labels.instance }})"
          description: "CPU 使用率超过 80%，当前值: {{ $value | printf \"%.1f\" }}%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高 (实例 {{ $labels.instance }})"
          description: "内存使用率超过 85%，当前值: {{ $value | printf \"%.1f\" }}%"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "磁盘空间不足 (实例 {{ $labels.instance }})"
          description: "根分区可用空间低于 15%，当前值: {{ $value | printf \"%.1f\" }}%"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务离线 (实例 {{ $labels.instance }})"
          description: "{{ $labels.job }} 实例 {{ $labels.instance }} 已不可达"

      - alert: HighDiskIO
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘 IO 繁忙 (实例 {{ $labels.instance }})"
          description: "磁盘 IO 等待时间超过 80%，可能存在 IO 瓶颈"
